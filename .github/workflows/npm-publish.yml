name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - run: npm view leak-hunter version --registry=https://registry.npmjs.org/
      - run: npm owner ls leak-hunter --registry=https://registry.npmjs.org/

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Align npm version with release tag
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version
      - run: npm publish --provenance --access public
        env:
          LEAK_HUNTER_RELEASE_ASSET_RETRIES: 12
          LEAK_HUNTER_RELEASE_ASSET_RETRY_DELAY_MS: 10000
