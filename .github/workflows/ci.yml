name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cargo fmt --all -- --check
      - run: cargo test
      - run: npm test
      - name: Self scan
        run: cargo run --quiet -- --json --min-risk 40 . > leak-hunter-report.json
