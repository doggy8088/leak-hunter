# Generated-style cargo-dist release workflow for leak-hunter.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      val: ${{ steps.plan.outputs.val }}
    steps:
      - uses: actions/checkout@v4
      - uses: axodotdev/cargo-dist@v0.28.0
        id: plan
        with:
          command: plan

  build:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: axodotdev/cargo-dist@v0.28.0
        with:
          command: build
          target: ${{ matrix.target }}

  host:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: axodotdev/cargo-dist@v0.28.0
        with:
          command: host
